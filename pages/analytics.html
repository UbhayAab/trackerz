<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Trackerz · Analytics</title>
    <script>(function(){try{var p=localStorage.getItem('trackerz.theme')||'system';var d=p==='dark'||(p==='system'&&matchMedia('(prefers-color-scheme: dark)').matches);document.documentElement.dataset.theme=d?'dark':'light'}catch(e){}})();</script>
    <link rel="stylesheet" href="../styles.css" />
    <link rel="manifest" href="../manifest.webmanifest" />
    <link rel="icon" href="../icons/icon-192.svg" type="image/svg+xml" />
    <meta name="theme-color" content="#138a5b" />
  </head>
  <body>
    <div class="app-shell page-shell">
      <header class="topbar topbar-tight">
        <div>
          <p class="eyebrow">Trackerz</p>
          <h1 class="topbar-title">Analytics</h1>
        </div>
        <a class="icon-link" href="./settings.html" aria-label="Settings">⚙</a>
      </header>

      <main>
        <section class="command-panel" aria-label="Trends">
          <div class="panel-title-row"><div><p class="eyebrow">Trends</p><h2>Day · Week · Month</h2></div></div>
          <div id="dashboardViews" class="dashboard-views"></div>
        </section>

        <section class="command-panel" aria-labelledby="analytics-insights-title">
          <div class="panel-title-row"><div><p class="eyebrow">For you</p><h2 id="analytics-insights-title">What your data says</h2></div></div>
          <div id="insightCards" class="insight-cards"></div>
        </section>

        <section class="ai-panel" aria-labelledby="analytics-ai-title">
          <div class="panel-title-row"><div><p class="eyebrow">AI</p><h2 id="analytics-ai-title">Smart analysis</h2></div></div>
          <ul id="insightList" class="insight-list"></ul>
        </section>
      </main>

      <nav id="bottomNav" class="bottom-nav" aria-label="Main navigation"><a class="nav-item" href="../index.html">Home</a><a class="nav-item" href="../pages/money.html">Money</a><a class="nav-item" href="../pages/diet.html">Diet</a><a class="nav-item" href="../pages/gym.html">Gym</a><a class="nav-item active" href="../pages/analytics.html" aria-current="page">Stats</a><a class="nav-item" href="../pages/settings.html">Settings</a></nav>
    </div>

    <script type="module" src="../src/pages/analytics.js"></script>
  </body>
</html>
