<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Trackerz - Query audit</title>
    <script>(function(){try{var p=localStorage.getItem('trackerz.theme')||'system';var d=p==='dark'||(p==='system'&&matchMedia('(prefers-color-scheme: dark)').matches);document.documentElement.dataset.theme=d?'dark':'light'}catch(e){}})();</script>
    <link rel="stylesheet" href="../styles.css" />
    <link rel="manifest" href="../manifest.webmanifest" />
    <link rel="icon" href="../icons/icon-192.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="../icons/icon-192.svg" />
    <meta name="theme-color" content="#138a5b" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
  </head>
  <body>
    <div class="app-shell page-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Audit</p>
          <h1>Every query, date-stamped</h1>
        </div>
        <a class="icon-link" href="./diagnostics.html" aria-label="Open diagnostics">Diagnostics</a>
      </header>

      <main>
        <section class="page-hero">
          <div>
            <p class="eyebrow">What the AI did with what you said</p>
            <h2>Review how the app behaved - read back your raw captures and the tool calls they triggered.</h2>
          </div>
          <button id="auditRefresh" class="primary-button" type="button">Refresh</button>
        </section>

        <section class="command-panel" id="dupeSection">
          <div class="panel-title-row">
            <div>
              <p class="eyebrow">Possible duplicates</p>
              <h2>Same event, captured twice?</h2>
            </div>
          </div>
          <div id="dupeList" class="dupe-list"></div>
        </section>

        <section class="command-panel">
          <div class="audit-controls">
            <label>Date range
              <select id="auditSince">
                <option value="1">Today</option>
                <option value="7" selected>Last 7 days</option>
                <option value="30">Last 30 days</option>
                <option value="90">Last 90 days</option>
              </select>
            </label>
            <label>Action
              <select id="auditAction"></select>
            </label>
            <label>Domain
              <select id="auditDomain">
                <option value="all">All</option>
                <option value="money">Money</option>
                <option value="diet">Diet</option>
                <option value="gym">Gym</option>
                <option value="wellness">Wellness</option>
                <option value="memory">Memory</option>
                <option value="general">General</option>
              </select>
            </label>
            <label>Outcome
              <select id="auditOutcome">
                <option value="all">All</option>
                <option value="applied">Applied</option>
                <option value="review">Needs review</option>
                <option value="rejected">Rejected</option>
                <option value="queued">Queued (offline)</option>
                <option value="errored">Errored</option>
                <option value="no_action">No action</option>
              </select>
            </label>
            <label class="audit-search-label">Search
              <input id="auditSearch" type="search" placeholder="text in your query…" />
            </label>
          </div>
          <div id="auditTotals" class="audit-totals"></div>
        </section>

        <section class="command-panel">
          <div id="auditList" class="audit-list"></div>
        </section>
      </main>

      <nav id="bottomNav" class="bottom-nav" aria-label="Main navigation"><a class="nav-item" href="../index.html">Home</a><a class="nav-item" href="../pages/money.html">Money</a><a class="nav-item" href="../pages/diet.html">Diet</a><a class="nav-item" href="../pages/gym.html">Gym</a><a class="nav-item" href="../pages/analytics.html">Stats</a><a class="nav-item" href="../pages/settings.html">Settings</a></nav>
    </div>

    <script type="module" src="../src/pages/audit.js"></script>
  </body>
</html>
