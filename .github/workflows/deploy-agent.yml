name: Deploy agent function

# Deploys supabase/functions/agent to the live project from GitHub's runners.
# Needed because the corporate network blocks uploads to api.supabase.com, so a
# local `supabase functions deploy` / Management-API call can't get through.
#
# Setup (one time):
#   1. Create a Supabase Personal Access Token: https://supabase.com/dashboard/account/tokens
#   2. Repo → Settings → Secrets and variables → Actions → New repository secret
#      Name: SUPABASE_ACCESS_TOKEN   Value: sbp_...
# Then it runs automatically whenever the function changes on main, or press
# "Run workflow" on the Actions tab to deploy on demand.

on:
  push:
    branches: [main]
    paths:
      - "supabase/functions/**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy agent
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: supabase functions deploy agent --project-ref yyoewdcijplkhxleejtm
